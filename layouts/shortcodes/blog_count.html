<div class="blog-count-container">
  {{ $blogs := where (where .Site.RegularPages "Section" "blogs") "Draft" false }}
  {{ $count := len $blogs }}
  {{ if eq $count 0 }}
    <p class="blog-count-zero">目前还没有发布的博客文章</p>
  {{ else }}
    <p class="blog-count-number">目前共有 <span>{{ $count }}</span> 篇博客文章</p>
    {{ $desc := .Get 0 }}
    {{ if $desc }}
      <p class="blog-count-desc">{{ $desc }}</p>
    {{ end }}
  {{ end }}
</div>
